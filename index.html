<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caça-Palavras Educativo</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --mat:    #FF6B35;
    --port:   #4ECDC4;
    --cien:   #45B7D1;
    --geo:    #96CEB4;
    --hist:   #FFEAA7;
    --found:  #2ecc71;
    --bg:     #1a1a2e;
    --card:   #16213e;
    --card2:  #0f3460;
    --text:   #e0e0ff;
    --accent: #e94560;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BLOQUEIO DESKTOP / PC */
  @media (min-width: 1025px) {
    body::after {
      content: "⚠️ Este jogo foi otimizado para Celulares e Tablets. Por favor, acesse via dispositivo móvel ou reduza a largura do seu navegador.";
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      font-size: 1.5rem;
      font-family: 'Fredoka One', cursive;
    }
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 35% 15%, rgba(255,255,255,.15) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 10px;
  }

  header {
    text-align: center;
    padding: 15px 0 10px;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.5rem, 8vw, 2.5rem);
    background: linear-gradient(135deg, var(--mat), var(--port), var(--cien), var(--geo));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { color: #aab; font-size: 0.8rem; margin-top: 5px;}

  .cat-bar {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 10px 5px;
    margin-bottom: 10px;
    scrollbar-width: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }

  .cat-btn {
    font-family: 'Fredoka One', cursive;
    border: none;
    border-radius: 50px;
    padding: 8px 15px;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    color: #1a1a2e;
    font-weight: 700;
  }
  .cat-btn.active { outline: 3px solid #fff; transform: scale(1.05); }
  .cat-btn[data-cat="matematica"]   { background: var(--mat); }
  .cat-btn[data-cat="portugues"]    { background: var(--port); }
  .cat-btn[data-cat="ciencias"]     { background: var(--cien); }
  .cat-btn[data-cat="geografia"]    { background: var(--geo); }
  .cat-btn[data-cat="historia"]     { background: var(--hist); }

  .game-area {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .grid-wrap {
    background: var(--card);
    border-radius: 15px;
    padding: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.06);
  }
  
  #wordGrid {
    display: grid;
    gap: 2px;
    user-select: none;
    touch-action: none;
  }

  .cell {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(0.7rem, 4vw, 1.2rem);
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    text-transform: uppercase;
  }
  .cell.selected { background: rgba(255,255,255,0.3); transform: scale(1.1); }
  .cell.found { color: #1a1a2e !important; }

  .sidebar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .timer-bar {
    grid-column: span 2;
    background: var(--card2);
    border-radius: 15px;
    padding: 10px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border: 2px solid var(--accent);
  }
  .timer-val { font-size: 1.8rem; font-family: 'Fredoka One'; color: var(--accent); }
  .timer-val.warning { animation: shake 0.2s infinite; color: #ff0000; }

  @keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(2px); }
    75% { transform: translateX(-2px); }
  }

  .words-panel, .hint-panel {
    background: var(--card);
    border-radius: 15px;
    padding: 12px;
    font-size: 0.8rem;
  }

  .controls {
    grid-column: span 2;
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-family: 'Fredoka One';
    cursor: pointer;
  }
  .btn-new { background: var(--accent); color: white; }
  .btn-hint { background: var(--card2); color: white; }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .win-card { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid gold; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🔤 Caça-Palavras Educativo</h1>
    <p>Powered by Sebastiao Alves de Almeida</p>
  </header>

  <div class="cat-bar" id="catBar"></div>
  
  <div class="game-area">
    <div class="grid-wrap">
      <div id="wordGrid"></div>
      <div class="progress-wrap" style="height: 6px; background: #333; margin-top:10px; border-radius:3px;">
        <div id="progress" style="width:0%; height:100%; background: var(--found); transition: 0.3s;"></div>
      </div>
    </div>

    <div class="sidebar">
      <div class="timer-bar">
        <span class="timer-label">⏳ TEMPO:</span>
        <span class="timer-val" id="timerVal">01:30</span>
      </div>
      
      <div class="words-panel">
        <ul class="word-list" id="wordList" style="list-style:none"></ul>
      </div>

      <div class="hint-panel">
        <p id="hintText">Encontre as palavras!</p>
      </div>

      <div class="controls">
        <button class="btn btn-new" onclick="newGame()">🔄 NOVO JOGO</button>
        <button class="btn btn-hint" onclick="showHint()">💡 DICA</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="win-card" id="winCard">
    <span style="font-size: 5rem;" id="winIcon">🏆</span>
    <h2 id="winTitle" style="font-family: 'Fredoka One'; margin: 15px 0;">VITÓRIA!</h2>
    <p id="winMsg" style="margin-bottom: 20px;"></p>
    <button class="btn btn-new" onclick="closeOverlay(); newGame();">PRÓXIMO NÍVEL</button>
  </div>
</div>

<script>
// SISTEMA DE AUDIO SINTETIZADO
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'gain') {
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'lose') {
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'win') {
        [523, 659, 783].forEach((f, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.frequency.value = f; o.connect(g); g.connect(audioCtx.destination);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime + i*0.1);
            o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.4);
        });
    }
}

// BANCO DE DADOS AMPLIADO (Novas palavras adicionadas aqui)
const CATEGORIES = {
  matematica: { label: '➕ Mat', color: '#FF6B35', words: [
    { w: 'TRIANGULO', hint: '3 lados e 3 ângulos.' }, { w: 'FRACAO', hint: 'Parte de um todo.' },
    { w: 'NUMERO', hint: 'Símbolo para contar.' }, { w: 'SOMA', hint: 'Adição.' },
    { w: 'DIVISAO', hint: 'Repartir em partes.' }, { w: 'QUADRADO', hint: '4 lados iguais.' },
    { w: 'SUBTRACAO', hint: 'Operação de menos.' }, { w: 'MULTIPLICACAO', hint: 'Vezes.' },
    { w: 'ANGULO', hint: 'Encontro de duas retas.' }, { w: 'ALGEBRA', hint: 'Letras e números.' },
    { w: 'GEOMETRIA', hint: 'Estudo das formas.' }, { w: 'LOGICA', hint: 'Raciocínio correto.' },
    { w: 'CALCULO', hint: 'Ato de computar.' }, { w: 'CILINDRO', hint: 'Forma de lata.' },
    { w: 'LOSANGO', hint: 'Forma do balão.' }, { w: 'TABUADA', hint: 'Tabela de cálculo.' }
  ]},
  portugues: { label: '📖 Port', color: '#4ECDC4', words: [
    { w: 'VERBO', hint: 'Indica ação.' }, { w: 'SILABA', hint: 'Unidade sonora.' },
    { w: 'POEMA', hint: 'Texto em versos.' }, { w: 'LETRA', hint: 'Símbolo do som.' },
    { w: 'CONTO', hint: 'Narrativa curta.' }, { w: 'VOGAL', hint: 'A, E, I, O, U.' },
    { w: 'ADJETIVO', hint: 'Dá qualidade.' }, { w: 'SUJEITO', hint: 'Quem faz a ação.' },
    { w: 'RIMA', hint: 'Sons iguais no final.' }, { w: 'FRASE', hint: 'Sentido completo.' },
    { w: 'SINTAXE', hint: 'Ordem das palavras.' }, { w: 'METAFORA', hint: 'Comparação implícita.' },
    { w: 'REDACAO', hint: 'Escrever um texto.' }, { w: 'DITONGO', hint: 'Duas vogais juntas.' },
    { w: 'PROSOPΟPEIA', hint: 'Humanizar objetos.' }, { w: 'GRAMATICA', hint: 'Regras da língua.' }
  ]},
  ciencias: { label: '🔬 Cien', color: '#45B7D1', words: [
    { w: 'CELULA', hint: 'Unidade da vida.' }, { w: 'OXIGENIO', hint: 'Gás vital.' },
    { w: 'ENERGIA', hint: 'Capacidade de trabalho.' }, { w: 'ATOMO', hint: 'Menor partícula.' },
    { w: 'PLANETA', hint: 'Corpo que orbita o Sol.' }, { w: 'SANGUE', hint: 'Líquido da vida.' },
    { w: 'ESPECIE', hint: 'Grupo de seres iguais.' }, { w: 'FOSSIL', hint: 'Resto antigo.' },
    { w: 'GENETICA', hint: 'Estudo do DNA.' }, { w: 'INVERTEBRADO', hint: 'Sem ossos.' },
    { w: 'MAMIFERO', hint: 'Mamar quando bebê.' }, { w: 'REACAO', hint: 'Mudança química.' },
    { w: 'SOLVENTE', hint: 'Dissolve substâncias.' }, { w: 'VACINA', hint: 'Proteção contra vírus.' }
  ]},
  geografia: { label: '🌍 Geo', color: '#96CEB4', words: [
    { w: 'OCEANO', hint: 'Água salgada.' }, { w: 'MAPA', hint: 'Desenho da terra.' },
    { w: 'CLIMA', hint: 'Tempo da região.' }, { w: 'SERRA', hint: 'Montanhas.' },
    { w: 'CAPITAL', hint: 'Cidade principal.' }, { w: 'ESTADO', hint: 'Divisão do país.' },
    { w: 'RELEVO', hint: 'Formas da terra.' }, { w: 'DESERTO', hint: 'Lugar muito seco.' },
    { w: 'FLORESTA', hint: 'Muitas árvores.' }, { w: 'FRONTEIRA', hint: 'Limite entre países.' },
    { w: 'MIGRAÇÃO', hint: 'Mudar de lugar.' }, { w: 'PECUARIA', hint: 'Criação de gado.' },
    { w: 'ROCHA', hint: 'Pedra natural.' }, { w: 'TURISMO', hint: 'Viajar a lazer.' }
  ]},
  historia: { label: '🏛️ Hist', color: '#FFEAA7', words: [
    { w: 'FARAOS', hint: 'Reis do Egito.' }, { w: 'COLONIA', hint: 'Território dominado.' },
    { w: 'PIRAMIDE', hint: 'Túmulo egípcio.' }, { w: 'DEMOCRACIA', hint: 'Governo do povo.' },
    { w: 'GUERRA', hint: 'Conflito armado.' }, { w: 'REPUBLICA', hint: 'Coisa pública.' },
    { w: 'IMPERIO', hint: 'Território de um imperador.' }, { w: 'ESCRAVAO', hint: 'Trabalho forçado.' },
    { w: 'MONARQUIA', hint: 'Rei ou rainha.' }, { w: 'REVOLUÇÃO', hint: 'Mudança radical.' },
    { w: 'NAVEGACAO', hint: 'Viagens pelo mar.' }, { w: 'MUSEU', hint: 'Guarda o passado.' },
    { w: 'TRADICAO', hint: 'Passado de pais para filhos.' }
  ]}
};

let currentCat = 'matematica';
let gridLetters = [];
let gridSize = 10;
let placedWords = [];
let foundWords = new Set();
let selecting = false;
let selStart = null;
let selCells = [];
let timerInterval = null;
let timeLeft = 90;

function init() {
  buildCatBar();
  selectCat('matematica');
  newGame();
}

function buildCatBar() {
  const bar = document.getElementById('catBar');
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = key;
    btn.textContent = cat.label;
    btn.onclick = () => { selectCat(key); newGame(); };
    bar.appendChild(btn);
  });
}

function selectCat(key) {
  currentCat = key;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === key));
}

function newGame() {
  foundWords.clear();
  clearInterval(timerInterval);
  timeLeft = 90;
  updateTimerDisplay();
  
  const catData = CATEGORIES[currentCat];
  // SORTEIO ALEATÓRIO: Pega 5 palavras aleatórias da lista de 15+ da categoria
  const wordObjs = shuffle([...catData.words]).slice(0, 5);
  
  gridLetters = Array.from({length: gridSize}, () => Array(gridSize).fill(''));
  placedWords = [];
  wordObjs.forEach(wo => placeWord(wo.w.toUpperCase(), wo.hint));

  const alpha = 'ABCDEFGHIJKLMNOPRSTUVZ';
  for (let r = 0; r < gridSize; r++)
    for (let c = 0; c < gridSize; c++)
      if (!gridLetters[r][c]) gridLetters[r][c] = alpha[Math.floor(Math.random() * alpha.length)];

  renderGrid();
  renderWordList();
  updateScore();

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 10) playSound('lose');
    if (timeLeft <= 0) gameOver();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  const el = document.getElementById('timerVal');
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  el.classList.toggle('warning', timeLeft <= 15);
}

function placeWord(word, hint) {
  const dirs = [[0,1],[1,0],[1,1],[0,-1],[-1,0]];
  for (const [dr, dc] of shuffle(dirs)) {
    for (let attempt = 0; attempt < 50; attempt++) {
      const sr = Math.floor(Math.random() * gridSize), sc = Math.floor(Math.random() * gridSize);
      let ok = true, cells = [];
      for (let i = 0; i < word.length; i++) {
        const r = sr + dr * i, c = sc + dc * i;
        if (r<0||r>=gridSize||c<0||c>=gridSize||(gridLetters[r][c]&&gridLetters[r][c]!==word[i])) {ok=false; break;}
        cells.push([r, c]);
      }
      if (ok) {
        cells.forEach(([r, c], i) => gridLetters[r][c] = word[i]);
        placedWords.push({ word, hint, cells });
        return;
      }
    }
  }
}

function renderGrid() {
  const grid = document.getElementById('wordGrid');
  grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
  grid.innerHTML = '';
  for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = gridLetters[r][c];
      cell.dataset.r = r; cell.dataset.c = c;
      cell.onmousedown = startSelect; cell.onmouseover = moveSelect; cell.onmouseup = endSelect;
      cell.ontouchstart = e => { startSelect(e.touches[0]); };
      cell.ontouchmove = e => { 
        const t = e.touches[0]; 
        moveSelect({target: document.elementFromPoint(t.clientX, t.clientY)}); 
      };
      cell.ontouchend = endSelect;
      grid.appendChild(cell);
    }
  }
}

function startSelect(e) { 
    selecting = true; 
    const c = cellAt(e.target || e); 
    if(c) { selStart = c; selCells = [c]; highlight(); }
}
function moveSelect(e) { 
    if (!selecting) return; 
    const cur = cellAt(e.target || e); 
    if(cur) { selCells = getCellsBetween(selStart, cur); highlight(); }
}
function endSelect() { 
    if (!selecting) return; 
    selecting = false; 
    checkWord(); 
    document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
}

function checkWord() {
  const selected = selCells.map(({r, c}) => gridLetters[r][c]).join('');
  const pw = placedWords.find(p => (p.word === selected || p.word === selected.split('').reverse().join('')) && !foundWords.has(p.word));
  if (pw) {
    foundWords.add(pw.word);
    pw.cells.forEach(([r, c]) => {
      const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      el.classList.add('found');
      el.style.background = CATEGORIES[currentCat].color;
    });
    document.getElementById('word-'+pw.word).style.textDecoration = 'line-through';
    document.getElementById('word-'+pw.word).style.opacity = '0.5';
    playSound('gain');
    updateScore();
    if (foundWords.size === placedWords.length) winLevel();
  }
}

function winLevel() {
    clearInterval(timerInterval);
    playSound('win');
    showOverlay('🏆 VITÓRIA!', `Nível concluído com sucesso!`);
}

function gameOver() {
    clearInterval(timerInterval);
    playSound('lose');
    showOverlay('⏰ FIM DE TEMPO', 'Tente novamente!');
}

function showOverlay(title, msg) {
    document.getElementById('winTitle').textContent = title;
    document.getElementById('winMsg').textContent = msg;
    document.getElementById('overlay').classList.add('show');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('show'); }

function renderWordList() {
  const list = document.getElementById('wordList');
  list.innerHTML = '';
  placedWords.forEach(pw => {
    const li = document.createElement('li');
    li.id = 'word-' + pw.word;
    li.textContent = '○ ' + pw.word;
    list.appendChild(li);
  });
}

function updateScore() {
  const pct = (foundWords.size / placedWords.length) * 100;
  document.getElementById('progress').style.width = pct + '%';
}

function showHint() {
    const rem = placedWords.filter(p => !foundWords.has(p.word));
    if(rem.length) document.getElementById('hintText').innerHTML = `<strong>DICA:</strong> ${rem[0].hint}`;
}

function cellAt(el) { return (el && el.dataset && el.dataset.r !== undefined) ? {r:+el.dataset.r, c:+el.dataset.c} : null; }
function highlight() {
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
  selCells.forEach(({r, c}) => document.querySelector(`[data-r="${r}"][data-c="${c}"]`)?.classList.add('selected'));
}
function getCellsBetween(a, b) {
  const dr = b.r - a.r, dc = b.c - a.c, len = Math.max(Math.abs(dr), Math.abs(dc));
  if (len === 0) return [a];
  if (Math.abs(dr) !== 0 && Math.abs(dc) !== 0 && Math.abs(dr) !== Math.abs(dc)) return [a];
  const sr = Math.sign(dr), sc = Math.sign(dc);
  return Array.from({length: len + 1}, (_, i) => ({r: a.r + sr*i, c: a.c + sc*i}));
}
function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

init();
</script>
</body>
</html>
